
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/chiara-react-app

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

  docker:
    name: Container Security and Publish
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for security scan
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan-target
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan gate (HIGH,CRITICAL)
        uses: aquasecurity/trivy-action@2.0.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan-target
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@2.0.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan-target
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF to GitHub Security
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Push image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-report:
    name: Nightly Full Security Report
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for nightly report
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:nightly-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy full-severity report (non-blocking)
        uses: aquasecurity/trivy-action@2.0.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:nightly-scan
          format: sarif
          output: trivy-nightly.sarif
          exit-code: '0'
          ignore-unfixed: true
          severity: LOW,MEDIUM,HIGH,CRITICAL

      - name: Upload nightly SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-nightly.sarif

      - name: Upload nightly report artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-nightly-sarif
          path: trivy-nightly.sarif