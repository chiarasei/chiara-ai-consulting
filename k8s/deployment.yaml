apiVersion: apps/v1
kind: Deployment
metadata:
  name: chiara-react-app
  namespace: chiara-app
  labels:
    app: chiara-react-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: chiara-react-app
  template:
    metadata:
      labels:
        app: chiara-react-app
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: chiara-react-app
          image: ghcr.io/chiarasei/chiara-react-app:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
